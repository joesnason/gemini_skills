description = "分析 logs/ 資料夾中的 build log，找出失敗原因並提供修復建議"
prompt = """
# 分析前準備（重要！）
1. **先確認檔案存在**：查看 logs/ 資料夾有哪些 .log 檔案。
2. 如果找到 build.log，直接開始分析該檔案。
3. 如果沒有找到任何 .log 檔案，請回報錯誤並說明 logs/ 資料夾是空的。

# 分析策略
1. **初步檢查**：使用 tail 或讀取結尾確認 build 最後的結果（SUCCESS/FAILURE）。
2. **錯誤定位**：搜尋關鍵字如 "error"、"FAILED"、"fatal"、"Exception"。
3. **上下文分析**：找到錯誤後，讀取該區域前後的內容以理解完整情況。
4. **根因分析**：識別根本原因（例如：缺少檔案、語法錯誤、依賴問題、磁碟空間等）。

# 輸出格式
請依照以下 Markdown 格式輸出分析結果：

## 分析摘要
- **分析時間**：[YYYY-MM-DD HH:mm:ss]
- **Build 狀態**：成功/失敗
- **失敗階段**：[Stage Name]（如有）
- **總耗時**：[Time]（如有）

## 錯誤摘要（如有）
| 錯誤類型 | 位置 | 描述 |
|----------|------|------|
| [類型] | [路徑:行號] | [簡短描述] |

## 根本原因
[詳細說明導致 build 失敗的根本原因]

## 建議修復方式
[提供 1-3 點具體的修復建議]

# 分析結果儲存
分析完成後，請將上述所有分析結果（包含分析摘要、錯誤摘要、根本原因與修復建議）完整記錄至 build-break-report.md 中。
"""
